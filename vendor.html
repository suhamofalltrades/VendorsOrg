<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vendor | VendorsOrg</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="navbar">
      <a class="brand" href="index.html">
        <span class="brand-mark">VO</span>
        <span>VendorsOrg</span>
      </a>
      <nav aria-label="Primary navigation">
        <ul class="nav-desktop">
          <li><a href="index.html#home">Home</a></li>
          <li><a href="index.html#about">About</a></li>
          <li><a href="index.html#categories">Categories</a></li>
          <li><a href="index.html#vendor-cta">Become a vendor</a></li>
          <li><a href="index.html#contact">Contact</a></li>
        </ul>
      </nav>
      <button class="menu-toggle" id="menuToggle" aria-label="Open menu" aria-expanded="false" aria-controls="mobileMenu"><span></span></button>
    </div>
    <div class="container mobile-menu" id="mobileMenu">
      <a href="index.html#home">Home</a>
      <a href="index.html#about">About</a>
      <a href="index.html#categories">Categories</a>
      <a href="index.html#vendor-cta">Become a vendor</a>
      <a href="index.html#contact">Contact</a>
    </div>
  </header>

  <main id="main" class="section">
    <div class="container detail-layout">
      <section class="detail-main">
        <div class="breadcrumbs" id="vendorBreadcrumb">Vendor</div>
        <div class="detail-hero">
          <img id="vendorImage" alt="" />
          <div class="detail-info">
            <h1 class="page-title" id="vendorName">Vendor</h1>
            <div class="small" id="vendorOwner"></div>
            <div class="detail-badges">
              <span class="badge" id="vendorRating"></span>
              <span class="badge" id="vendorCategory"></span>
              <span class="badge" id="vendorProvider"></span>
            </div>
            <div class="small" id="vendorAddress" style="margin-top:.75rem"></div>
            <div class="detail-actions">
              <a class="btn" id="vendorPhoneLink" href="#">Call</a>
              <a class="btn secondary" id="vendorWhatsAppLink" href="#" target="_blank" rel="noreferrer">WhatsApp</a>
            </div>
          </div>
        </div>

        <div class="detail-section">
          <h3>Description</h3>
          <p id="vendorDescription"></p>
        </div>

        <div class="detail-section">
          <h3>Services</h3>
          <div class="detail-badges" id="vendorServices"></div>
        </div>

        <div class="detail-section">
          <h3>Gallery</h3>
          <div class="gallery" id="vendorGallery"></div>
        </div>
      </section>

      <aside class="detail-side">
        <div class="stack">
          <div class="badge">Details</div>
          <img id="vendorLogo" alt="" style="width:84px;height:84px;border-radius:24px;border:1px solid var(--line)" />
          <div class="small" id="vendorReviewSummary"></div>
        </div>

        <div class="detail-section">
          <h3>Working hours</h3>
          <ul class="detail-list" id="vendorHours"></ul>
        </div>

        <div class="detail-section">
          <h3>Contact</h3>
          <div class="stack small" id="vendorContact"></div>
        </div>

        <div class="detail-section">
          <h3>Social</h3>
          <div class="detail-actions" id="vendorSocial"></div>
        </div>
      </aside>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <div>VendorsOrg</div>
      <div id="year"></div>
    </div>
  </footer>

  <script src="js/vendor.js" defer></script>
</body>
</html>
